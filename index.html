<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScalpAI — Combined Crypto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/3.8.0/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --navy:       #0b0f1a;
    --navy-mid:   #111827;
    --navy-light: #1a2236;
    --navy-card:  #141c2e;
    --gold:       #c9a84c;
    --gold-dim:   #9a7a30;
    --gold-glow:  rgba(201,168,76,0.15);
    --green:      #22c55e;
    --red:        #ef4444;
    --text:       #e8e4d9;
    --text-dim:   #8a8fa8;
    --border:     rgba(201,168,76,0.18);
    --ema-color:  #3b82f6;
    --mss-color:  #a855f7;
    --vpa-color:  #22c55e;
    --brk-color:  #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TICKER BAR ─────────────────────────────────────────────── */
  .ticker-wrap {
    background: var(--navy-card);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    height: 36px;
    flex-shrink: 0;
  }
  .ticker-track {
    display: flex;
    gap: 0;
    animation: ticker 30s linear infinite;
    white-space: nowrap;
    height: 100%;
    align-items: center;
  }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  .ticker-symbol { color: var(--gold); font-weight: 700; letter-spacing: 0.05em; }
  .ticker-price  { color: var(--text); }
  .ticker-change.up   { color: var(--green); }
  .ticker-change.down { color: var(--red); }

  /* ── HEADER ─────────────────────────────────────────────────── */
  .header {
    background: var(--navy-card);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 28px; height: 28px;
    border: 2px solid var(--gold);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; color: var(--gold);
  }
  .logo-text { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.08em; }
  .logo-sub  { font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em; }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .hstat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .hstat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .hstat-value { font-size: 15px; font-weight: 700; color: var(--text); }
  .hstat-value.gold  { color: var(--gold); }
  .hstat-value.green { color: var(--green); }
  .hstat-value.red   { color: var(--red); }

  .regime-badge {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .regime-badge.bull { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .regime-badge.bear { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .regime-badge.unknown { background: rgba(138,143,168,0.15); color: var(--text-dim); border: 1px solid rgba(138,143,168,0.3); }

  .kill-btn {
    padding: 6px 14px;
    border: 1px solid var(--red);
    background: rgba(239,68,68,0.1);
    color: var(--red);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .kill-btn:hover { background: rgba(239,68,68,0.25); }
  .kill-btn.active { background: var(--red); color: white; }

  /* ── NAV TABS ───────────────────────────────────────────────── */
  .nav {
    background: var(--navy-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 4px;
    height: 44px;
    flex-shrink: 0;
  }
  .nav-tab {
    padding: 6px 16px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border: 1px solid transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .nav-tab:hover { color: var(--text); background: var(--navy-light); }
  .nav-tab.active { color: var(--navy); background: var(--gold); border-color: var(--gold); }
  .nav-tab .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }
  .nav-tab.tab-home   .dot { background: var(--gold); }
  .nav-tab.tab-ema    .dot { background: var(--ema-color); }
  .nav-tab.tab-mss    .dot { background: var(--mss-color); }
  .nav-tab.tab-vpa    .dot { background: var(--vpa-color); }
  .nav-tab.tab-brk    .dot { background: var(--brk-color); }
  .nav-tab.tab-diary  .dot { background: var(--text-dim); }
  .nav-tab.active .dot { background: var(--navy); }

  .pos-indicator {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── MAIN CONTENT ───────────────────────────────────────────── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  /* ── CARDS ──────────────────────────────────────────────────── */
  .card {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card-title {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── HOME LAYOUT ────────────────────────────────────────────── */
  .home-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-value.gold  { color: var(--gold); }
  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }
  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  /* ── POSITIONS TABLE ────────────────────────────────────────── */
  .pos-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .pos-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .pos-table td { padding: 10px 12px; border-bottom: 1px solid rgba(201,168,76,0.06); }
  .pos-table tr:last-child td { border-bottom: none; }
  .pos-table tr:hover td { background: var(--navy-light); }

  .strategy-badge {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }
  .badge-ema { background: rgba(59,130,246,0.2); color: #3b82f6; }
  .badge-mss { background: rgba(168,85,247,0.2); color: #a855f7; }
  .badge-vpa { background: rgba(34,197,94,0.2);  color: #22c55e; }
  .badge-brk { background: rgba(249,115,22,0.2); color: #f97316; }

  /* ── STRATEGY PAGE ──────────────────────────────────────────── */
  .strategy-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
    height: calc(100vh - 200px);
  }
  .chart-panel {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .chart-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chart-symbol { font-size: 16px; font-weight: 700; color: var(--text); }
  .chart-price  { font-size: 20px; font-weight: 700; color: var(--gold); }
  .chart-body   { flex: 1; }

  .tf-btns { display: flex; gap: 4px; }
  .tf-btn {
    padding: 3px 9px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-dim);
    background: var(--navy-light);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .tf-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }

  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  /* Position detail card */
  .pos-detail {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .pos-detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .pos-detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(201,168,76,0.07);
    font-size: 12px;
  }
  .pos-detail-row:last-child { border-bottom: none; }
  .pos-detail-key { color: var(--text-dim); }
  .pos-detail-val { color: var(--text); font-weight: 600; }

  .tp-line { color: var(--green); font-weight: 700; }
  .sl-line { color: var(--red); font-weight: 700; }
  .pnl-pos { color: var(--green); font-weight: 700; }
  .pnl-neg { color: var(--red); font-weight: 700; }

  /* Signal card */
  .signal-card {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .signal-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 11px;
    border-bottom: 1px solid rgba(201,168,76,0.06);
  }
  .signal-row:last-child { border-bottom: none; }
  .signal-key { color: var(--text-dim); }
  .signal-val { color: var(--text); font-weight: 600; }

  .score-bar-wrap { width: 80px; background: var(--navy-light); border-radius: 3px; height: 6px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }

  /* ── DIARY ──────────────────────────────────────────────────── */
  .diary-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    transition: all 0.15s;
  }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

  .diary-entry {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,0.06);
    font-size: 12px;
    align-items: flex-start;
  }
  .diary-entry:last-child { border-bottom: none; }
  .diary-time    { color: var(--text-dim); min-width: 42px; font-size: 11px; padding-top: 1px; }
  .diary-symbol  { min-width: 80px; font-weight: 700; }
  .diary-text    { color: var(--text-dim); flex: 1; line-height: 1.5; }
  .diary-type-win    { color: var(--green); }
  .diary-type-loss   { color: var(--red); }
  .diary-type-trade  { color: var(--gold); }
  .diary-type-system { color: var(--text-dim); }

  /* ── STRATEGY OVERVIEW SIGNALS ──────────────────────────────── */
  .signals-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .signal-coin-card {
    background: var(--navy-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }
  .signal-coin-name { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }

  /* ── DAILY LIMIT BAR ────────────────────────────────────────── */
  .daily-bar-wrap {
    background: var(--navy-light);
    border-radius: 3px;
    height: 4px;
    overflow: hidden;
    margin-top: 6px;
  }
  .daily-bar { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.5s; }
  .daily-bar.danger { background: var(--red); }

  /* ── EMPTY STATE ────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

  /* ── SCROLLBAR ──────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  .updated { font-size: 10px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- ── TICKER BAR ───────────────────────────────────────────────────── -->
<div class="ticker-wrap">
  <div class="ticker-track" id="tickerTrack">
    <!-- Populated by JS, duplicated for infinite scroll -->
  </div>
</div>

<!-- ── HEADER ───────────────────────────────────────────────────────── -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">S</div>
    <div>
      <div class="logo-text">SCALPAI</div>
      <div class="logo-sub">COMBINED CRYPTO</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-label">Equity</div>
      <div class="hstat-value gold" id="hEquity">—</div>
    </div>
    <div class="hstat">
      <div class="hstat-label">Day P&L</div>
      <div class="hstat-value" id="hDayPnl">—</div>
    </div>
    <div class="hstat">
      <div class="hstat-label">Win Rate</div>
      <div class="hstat-value" id="hWinRate">—</div>
    </div>
    <div id="regimeBadge" class="regime-badge unknown">— REGIME</div>
    <button class="kill-btn" id="killBtn" onclick="toggleKill()">KILL</button>
    <span class="updated"><span class="live-dot"></span><span id="updatedTime">—</span></span>
  </div>
</div>

<!-- ── NAV ──────────────────────────────────────────────────────────── -->
<div class="nav">
  <div class="nav-tab tab-home active" onclick="showTab('home')"><div class="dot"></div>Home</div>
  <div class="nav-tab tab-ema"  onclick="showTab('ema')"><div class="dot"></div>EMA <span id="ema-pos-dot"></span></div>
  <div class="nav-tab tab-mss"  onclick="showTab('mss')"><div class="dot"></div>MSS <span id="mss-pos-dot"></span></div>
  <div class="nav-tab tab-vpa"  onclick="showTab('vpa')"><div class="dot"></div>VPA <span id="vpa-pos-dot"></span></div>
  <div class="nav-tab tab-brk"  onclick="showTab('brk')"><div class="dot"></div>Breakout <span id="brk-pos-dot"></span></div>
  <div class="nav-tab tab-diary" onclick="showTab('diary')"><div class="dot"></div>Diary</div>
</div>

<!-- ── MAIN ─────────────────────────────────────────────────────────── -->
<div class="main" id="mainContent"></div>

<script>
const RAILWAY_URL = 'https://combinedcryptobot-production.up.railway.app';
const SYMBOLS = ['BTC/USD','ETH/USD','SOL/USD','XRP/USD','DOGE/USD'];
const STRATEGY_COLORS = { EMA: '#3b82f6', MSS: '#a855f7', VPA: '#22c55e', Breakout: '#f97316' };
const STRATEGY_KEYS   = { EMA: 'EMA', MSS: 'MSS', VPA: 'VPA', Breakout: 'Breakout', brk: 'Breakout' };

let LIVE = {};
let currentTab = 'home';
let activeCharts = {};
let diaryFilter = 'ALL';
let tickerPrices = {};

// ── Fetch ────────────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const raw = await fetch(`${RAILWAY_URL}/status`);
    const text = await raw.text();
    const clean = text.replace(/\bNaN\b/g,'0').replace(/\bInfinity\b/g,'0');
    LIVE = JSON.parse(clean);
    updateHeader();
    updateTicker();
    updateNavDots();
    if (currentTab !== 'diary') renderCurrentTab();
    document.getElementById('updatedTime').textContent = new Date().toLocaleTimeString();
  } catch(e) { console.error('Fetch error:', e); }
}

async function fetchDiary() {
  try {
    const r = await fetch(`${RAILWAY_URL}/diary`);
    const d = await r.json();
    LIVE.diary = d.diary || [];
    if (currentTab === 'diary') renderDiary();
  } catch(e) {}
}

async function fetchBars(symbol, tf='5Min') {
  try {
    const r = await fetch(`${RAILWAY_URL}/bars?symbol=${encodeURIComponent(symbol)}&timeframe=${tf}`);
    return await r.json();
  } catch(e) { return []; }
}

// ── Header ───────────────────────────────────────────────────────────
function updateHeader() {
  const eq = LIVE.account_equity || 0;
  const pnl = LIVE.day_pnl || 0;
  const wr  = LIVE.win_rate || 0;
  const regime = LIVE.market_regime || 'UNKNOWN';

  document.getElementById('hEquity').textContent  = '$' + fmt(eq);
  const pnlEl = document.getElementById('hDayPnl');
  pnlEl.textContent  = (pnl >= 0 ? '+' : '') + '$' + fmt(pnl);
  pnlEl.className = 'hstat-value ' + (pnl >= 0 ? 'green' : 'red');
  document.getElementById('hWinRate').textContent = wr + '%';

  const rb = document.getElementById('regimeBadge');
  rb.textContent = regime + ' MARKET';
  rb.className = 'regime-badge ' + (regime === 'BULL' ? 'bull' : regime === 'BEAR' ? 'bear' : 'unknown');

  const kb = document.getElementById('killBtn');
  kb.className = 'kill-btn' + (LIVE.killed ? ' active' : '');
  kb.textContent = LIVE.killed ? 'RESUME' : 'KILL';
}

function updateNavDots() {
  const sp = LIVE.strategy_positions || {};
  const strategies = { ema: 'EMA', mss: 'MSS', vpa: 'VPA', brk: 'Breakout' };
  for (const [tab, strat] of Object.entries(strategies)) {
    const el = document.getElementById(`${tab}-pos-dot`);
    if (!el) continue;
    if (sp[strat]) {
      el.innerHTML = '<span class="pos-indicator"></span>';
    } else {
      el.innerHTML = '';
    }
  }
}

// ── Ticker ───────────────────────────────────────────────────────────
function updateTicker() {
  const sigs = LIVE.signals || {};
  const prices = {};
  for (const sym of SYMBOLS) {
    const key = sym.replace('/','');
    const stratData = sigs[key] || {};
    let price = 0;
    for (const s of Object.values(stratData)) {
      if (s && s.price) { price = s.price; break; }
    }
    if (price) prices[sym] = price;
  }
  // Also check positions
  for (const pos of Object.values(LIVE.positions || {})) {
    if (pos.current_price) prices[pos.symbol] = pos.current_price;
  }

  if (Object.keys(prices).length === 0) return;

  let html = '';
  const items = Object.entries(prices);
  // Duplicate for seamless scroll
  for (let r = 0; r < 4; r++) {
    for (const [sym, price] of items) {
      const prev = tickerPrices[sym] || price;
      const chg = ((price - prev) / prev * 100).toFixed(3);
      const cls = parseFloat(chg) >= 0 ? 'up' : 'down';
      const arrow = parseFloat(chg) >= 0 ? '▲' : '▼';
      html += `<div class="ticker-item">
        <span class="ticker-symbol">${sym}</span>
        <span class="ticker-price">$${fmtPrice(sym, price)}</span>
        <span class="ticker-change ${cls}">${arrow} ${Math.abs(chg)}%</span>
      </div>`;
    }
  }
  tickerPrices = {...tickerPrices, ...prices};
  document.getElementById('tickerTrack').innerHTML = html;
}

// ── Routing ──────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab-${tab}`)?.classList.add('active');
  activeCharts = {};
  renderCurrentTab();
}

function renderCurrentTab() {
  const tab = currentTab;
  if (tab === 'home')  renderHome();
  else if (tab === 'ema')   renderStrategy('EMA');
  else if (tab === 'mss')   renderStrategy('MSS');
  else if (tab === 'vpa')   renderStrategy('VPA');
  else if (tab === 'brk')   renderStrategy('Breakout');
  else if (tab === 'diary') renderDiary();
}

// ── HOME ─────────────────────────────────────────────────────────────
function renderHome() {
  const eq   = LIVE.account_equity || 0;
  const cash = LIVE.account_cash || 0;
  const pnl  = LIVE.day_pnl || 0;
  const wr   = LIVE.win_rate || 0;
  const total = LIVE.total_trades || 0;
  const pos  = LIVE.positions || {};
  const stats = LIVE.strategy_stats || {};
  const startEq = eq - pnl;
  const dailyLossPct = startEq > 0 ? Math.max(0, (startEq - eq) / startEq * 100) : 0;
  const dailyPct = Math.min(100, dailyLossPct / 5 * 100);

  let posRows = '';
  for (const [sym, p] of Object.entries(pos)) {
    const entry = p.entry || 0;
    const curr  = p.current_price || entry;
    const pct   = ((curr - entry) / entry * 100).toFixed(2);
    const pnlVal = ((curr - entry) * (p.qty || 0)).toFixed(2);
    const strat = p.strategy || '?';
    const tp = (entry * (1 + 0.015)).toFixed(4);
    const sl = (entry * (1 - 0.0075)).toFixed(4);
    posRows += `<tr>
      <td><span class="strategy-badge badge-${strat.toLowerCase().replace('breakout','brk')}">${strat}</span></td>
      <td style="font-weight:700;color:var(--gold)">${sym}</td>
      <td>$${fmtPrice(sym, entry)}</td>
      <td style="color:var(--green)">$${fmtPrice(sym, parseFloat(tp))}</td>
      <td style="color:var(--red)">$${fmtPrice(sym, parseFloat(sl))}</td>
      <td class="${parseFloat(pct)>=0?'pnl-pos':'pnl-neg'}">${pct >= 0 ? '+' : ''}${pct}%</td>
      <td class="${parseFloat(pnlVal)>=0?'pnl-pos':'pnl-neg'}">${parseFloat(pnlVal)>=0?'+':''}$${Math.abs(pnlVal)}</td>
      <td style="color:var(--text-dim);font-size:11px">${p.open_time ? new Date(p.open_time).toLocaleTimeString() : '—'}</td>
    </tr>`;
  }

  let stratStats = '';
  for (const [name, color] of Object.entries(STRATEGY_COLORS)) {
    const s = stats[name] || {trades:0,wins:0,pnl:0};
    const swr = s.trades > 0 ? Math.round(s.wins/s.trades*100) : 0;
    stratStats += `<div class="stat-card">
      <div class="stat-label" style="color:${color}">${name}</div>
      <div class="stat-value">${s.trades}</div>
      <div class="stat-sub">${swr}% win · ${s.pnl >= 0 ? '+' : ''}$${fmt(s.pnl)}</div>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="home-grid">
      <div class="stat-card">
        <div class="stat-label">Equity</div>
        <div class="stat-value gold">$${fmt(eq)}</div>
        <div class="stat-sub">Cash $${fmt(cash)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Day P&L</div>
        <div class="stat-value ${pnl>=0?'green':'red'}">${pnl>=0?'+':''}$${fmt(pnl)}</div>
        <div class="stat-sub">Daily limit 5% · Used ${dailyLossPct.toFixed(2)}%</div>
        <div class="daily-bar-wrap"><div class="daily-bar ${dailyPct>80?'danger':''}" style="width:${dailyPct}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Overall Win Rate</div>
        <div class="stat-value ${wr>=50?'green':wr>=34?'gold':'red'}">${wr}%</div>
        <div class="stat-sub">${total} trades total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Open Positions</div>
        <div class="stat-value gold">${Object.keys(pos).length} / 4</div>
        <div class="stat-sub">Regime: ${LIVE.market_regime || '—'}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
      ${stratStats}
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Open Positions
        <span style="font-size:10px;color:var(--text-dim)">${Object.keys(pos).length} active</span>
      </div>
      ${Object.keys(pos).length > 0 ? `
        <table class="pos-table">
          <thead><tr>
            <th>Strategy</th><th>Symbol</th><th>Entry</th>
            <th>TP</th><th>SL</th><th>%</th><th>P&L</th><th>Opened</th>
          </tr></thead>
          <tbody>${posRows}</tbody>
        </table>` : `<div class="empty-state"><div class="icon">📊</div>No open positions — all strategies watching</div>`}
    </div>

    <div class="card">
      <div class="card-title">Recent Activity</div>
      ${renderMiniDiary(8)}
    </div>`;
}

function renderMiniDiary(limit) {
  const entries = (LIVE.diary || []).slice(0, limit);
  if (!entries.length) return '<div class="empty-state" style="padding:20px">No diary entries yet</div>';
  return entries.map(e => `
    <div class="diary-entry">
      <span class="diary-time">${e.time}</span>
      <span class="diary-symbol diary-type-${e.type}">${e.symbol}</span>
      <span class="diary-text">${e.text}</span>
    </div>`).join('');
}

// ── STRATEGY PAGE ────────────────────────────────────────────────────
async function renderStrategy(strategy) {
  const sp  = LIVE.strategy_positions || {};
  const pos = LIVE.positions || {};
  const sigs = LIVE.signals || {};
  const heldSym = sp[strategy];
  const hasPos  = heldSym && pos[heldSym];

  // Determine which symbol to show
  let displaySym = heldSym || 'BTC/USD';

  // If no position, find the symbol with highest signal score
  if (!hasPos) {
    let bestScore = -1;
    for (const sym of SYMBOLS) {
      const key = sym.replace('/','');
      const s = (sigs[key] || {})[strategy] || {};
      const score = s.buy_score || 0;
      if (score > bestScore) { bestScore = score; displaySym = sym; }
    }
  }

  const stratColor = STRATEGY_COLORS[strategy];
  const pos_data   = hasPos ? pos[heldSym] : null;
  const sigKey     = displaySym.replace('/','');
  const sig        = (sigs[sigKey] || {})[strategy] || {};

  document.getElementById('mainContent').innerHTML = `
    <div class="strategy-layout">
      <div class="chart-panel">
        <div class="chart-header">
          <div>
            <div class="chart-symbol" style="color:${stratColor}">[${strategy}]
              <span style="color:var(--text);margin-left:8px">${displaySym}</span>
            </div>
            <div style="font-size:10px;color:var(--text-dim);margin-top:2px">
              ${hasPos ? '🟢 Position open since ' + new Date(pos_data.open_time).toLocaleTimeString() : '👁 Watching — last signal'}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="chart-price" id="chartPrice">$${sig.price ? fmtPrice(displaySym, sig.price) : '—'}</div>
            <div class="tf-btns">
              <div class="tf-btn active" onclick="changeTf(this,'1Min','${strategy}','${displaySym}')">1M</div>
              <div class="tf-btn" onclick="changeTf(this,'5Min','${strategy}','${displaySym}')">5M</div>
              <div class="tf-btn" onclick="changeTf(this,'1Hour','${strategy}','${displaySym}')">1H</div>
            </div>
          </div>
        </div>
        <div class="chart-body" id="chartBody"></div>
      </div>

      <div class="side-panel">
        ${hasPos ? renderPosDetail(pos_data, strategy) : ''}
        ${renderSignalCard(strategy, displaySym, sig)}
        ${renderAllSignals(strategy)}
      </div>
    </div>`;

  // Load chart
  await loadChart(displaySym, '1Min', strategy, pos_data);
}

function renderPosDetail(pos, strategy) {

  const entry  = pos.entry || 0;
  const curr   = pos.current_price || entry;
  const qty    = pos.qty || 0;
  const pct    = ((curr - entry) / entry * 100).toFixed(3);
  const pnl    = ((curr - entry) * qty).toFixed(2);
  const tp     = (entry * 1.015).toFixed(5);
  const sl     = (entry * 0.9925).toFixed(5);
  const pips_to_tp = ((parseFloat(tp) - curr) / curr * 100).toFixed(3);
  const pips_to_sl = ((curr - parseFloat(sl)) / curr * 100).toFixed(3);

  return `<div class="pos-detail">
    <div class="pos-detail-header">
      <span style="font-weight:700;color:var(--text)">${pos.symbol}</span>
      <span class="strategy-badge badge-${strategy.toLowerCase().replace('breakout','brk')}">${strategy}</span>
    </div>
    <div class="pos-detail-row"><span class="pos-detail-key">Entry</span><span class="pos-detail-val">$${entry.toFixed(5)}</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key">Current</span><span class="pos-detail-val">$${curr.toFixed ? curr.toFixed(5) : curr}</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key">Qty</span><span class="pos-detail-val">${qty}</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key">Unrealized P&L</span>
      <span class="${parseFloat(pnl)>=0?'pnl-pos':'pnl-neg'}">${parseFloat(pnl)>=0?'+':''}$${Math.abs(pnl)}</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key">Change</span>
      <span class="${parseFloat(pct)>=0?'pnl-pos':'pnl-neg'}">${parseFloat(pct)>=0?'+':''}${pct}%</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key tp-line">▲ Take Profit</span>
      <span class="tp-line">$${parseFloat(tp).toFixed(4)} (+1.5%)</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key">  ↑ Pips to TP</span><span style="color:var(--green)">${pips_to_tp}%</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key sl-line">▼ Stop Loss</span>
      <span class="sl-line">$${parseFloat(sl).toFixed(4)} (-0.75%)</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key">  ↓ Buffer to SL</span><span style="color:var(--red)">${pips_to_sl}%</span></div>
    <div class="pos-detail-row"><span class="pos-detail-key">Opened</span>
      <span class="pos-detail-val">${new Date(pos.open_time).toLocaleTimeString()}</span></div>

function renderSignalCard(strategy, symbol, sig) {
  const color = STRATEGY_COLORS[strategy];
  const score = sig.buy_score || 0;
  const maxScore = 8;
  const barW = Math.min(100, score / maxScore * 100);

  let rows = `<div class="signal-row">
    <span class="signal-key">Symbol</span>
    <span class="signal-val" style="color:var(--gold)">${symbol}</span>
  </div>
  <div class="signal-row">
    <span class="signal-key">Score</span>
    <span class="signal-val">${score}
      <div class="score-bar-wrap" style="display:inline-block;vertical-align:middle;margin-left:8px">
        <div class="score-bar" style="width:${barW}%;background:${color}"></div>
      </div>
    </span>
  </div>`;

  if (sig.price) rows += `<div class="signal-row"><span class="signal-key">Price</span><span class="signal-val">$${fmtPrice(symbol, sig.price)}</span></div>`;

  if (strategy === 'EMA') {
    if (sig.rsi !== undefined)     rows += row('RSI', sig.rsi?.toFixed(1), sig.rsi < 40 ? 'var(--green)' : sig.rsi > 55 ? 'var(--red)' : 'var(--text)');
    if (sig.rsi_rising !== undefined) rows += row('RSI Rising', sig.rsi_rising ? '✓ Yes' : '✗ No', sig.rsi_rising ? 'var(--green)' : 'var(--red)');
    if (sig.macd_h !== undefined)  rows += row('MACD H', sig.macd_h?.toFixed(4));
    if (sig.bb_bw !== undefined)   rows += row('BB BW', sig.bb_bw?.toFixed(2) + '%');
    if (sig.vol_ratio !== undefined) rows += row('Volume', sig.vol_ratio?.toFixed(2) + 'x', sig.vol_ratio >= 1.5 ? 'var(--green)' : 'var(--text)');
    if (sig.blocked) rows += row('Blocked', sig.blocked, 'var(--red)');
  } else if (strategy === 'MSS') {
    if (sig.trend_1h) rows += row('1H Trend', sig.trend_1h, sig.trend_1h === 'BULL' ? 'var(--green)' : sig.trend_1h === 'BEAR' ? 'var(--red)' : 'var(--text-dim)');
    if (sig.mss_detected !== undefined) rows += row('MSS', sig.mss_detected ? '✓ Detected' : '✗ Watching', sig.mss_detected ? 'var(--green)' : 'var(--text-dim)');
    if (sig.rsi !== undefined)     rows += row('RSI', sig.rsi?.toFixed(1));
    if (sig.lookback_used)         rows += row('Lookback', sig.lookback_used + ' candles');
    if (sig.swing_low)             rows += row('Swing Low', '$' + sig.swing_low);
  } else if (strategy === 'VPA') {
    if (sig.vol_ratio !== undefined) rows += row('Volume', sig.vol_ratio?.toFixed(2) + 'x', sig.vol_ratio >= 2.5 ? 'var(--green)' : 'var(--text)');
    if (sig.close_ratio !== undefined) rows += row('Close Ratio', sig.close_ratio?.toFixed(2), sig.close_ratio >= 0.6 ? 'var(--green)' : 'var(--text)');
    if (sig.signals)               rows += row('Signals', (sig.signals || []).join(', ') || 'None');
  } else if (strategy === 'Breakout') {
    if (sig.vol_ratio !== undefined) rows += row('Volume', sig.vol_ratio?.toFixed(2) + 'x', sig.vol_ratio >= 2 ? 'var(--green)' : 'var(--text)');
    if (sig.candle_pct !== undefined) rows += row('Candle Move', sig.candle_pct?.toFixed(2) + '%', sig.candle_pct >= 2.5 ? 'var(--green)' : 'var(--text)');
    if (sig.consol_pct !== undefined) rows += row('Consol Range', sig.consol_pct?.toFixed(2) + '%');
    if (sig.momentum_override !== undefined) rows += row('Mom. Override', sig.momentum_override ? '✓ ACTIVE' : '✗ No', sig.momentum_override ? 'var(--green)' : 'var(--text-dim)');
    if (sig.signal_type) rows += row('Signal', sig.signal_type || 'NONE', sig.signal_type ? 'var(--gold)' : 'var(--text-dim)');
  }

  return `<div class="signal-card">
    <div class="card-title" style="color:${color};margin-bottom:10px">Last Signal — ${symbol}</div>
    ${rows}
  </div>`;
}

function row(key, val, color) {
  return `<div class="signal-row">
    <span class="signal-key">${key}</span>
    <span class="signal-val" style="${color ? 'color:'+color : ''}">${val ?? '—'}</span>
  </div>`;
}

function renderAllSignals(strategy) {
  const sigs = LIVE.signals || {};
  const color = STRATEGY_COLORS[strategy];
  let html = `<div class="signal-card">
    <div class="card-title" style="color:${color};margin-bottom:10px">All Pairs — ${strategy}</div>`;

  for (const sym of SYMBOLS) {
    const key = sym.replace('/','');
    const s = (sigs[key] || {})[strategy] || {};
    const score = s.buy_score || 0;
    const maxS = 8;
    const barW = Math.min(100, score / maxS * 100);
    html += `<div class="signal-row">
      <span class="signal-key" style="color:var(--gold);font-weight:700">${sym.split('/')[0]}</span>
      <span class="signal-val" style="display:flex;align-items:center;gap:8px">
        ${score}
        <div class="score-bar-wrap"><div class="score-bar" style="width:${barW}%;background:${color}"></div></div>
      </span>
    </div>`;
  }
  return html + '</div>';
}

// ── CHART ────────────────────────────────────────────────────────────
async function loadChart(symbol, tf, strategy, pos_data) {
  const el = document.getElementById('chartBody');
  if (!el) return;
  el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:12px">Loading chart...</div>';

  const bars = await fetchBars(symbol, tf);
  if (!bars || bars.length === 0) {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim)">No chart data available</div>';
    return;
  }

  el.innerHTML = '';
  const color = STRATEGY_COLORS[strategy];

  const chart = LightweightCharts.createChart(el, {
    width: el.clientWidth,
    height: el.clientHeight || 400,
    layout: { backgroundColor: '#141c2e', textColor: '#8a8fa8' },
    grid: { vertLines: { color: 'rgba(201,168,76,0.06)' }, horzLines: { color: 'rgba(201,168,76,0.06)' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: 'rgba(201,168,76,0.18)' },
    timeScale: { borderColor: 'rgba(201,168,76,0.18)', timeVisible: true, secondsVisible: false },
  });

  // Candlestick series
  const candleSeries = chart.addCandlestickSeries({
    upColor: '#22c55e', downColor: '#ef4444',
    borderUpColor: '#22c55e', borderDownColor: '#ef4444',
    wickUpColor: '#22c55e', wickDownColor: '#ef4444',
  });

  const candleData = bars.map(b => ({
    time: Math.floor(b.time),
    open: b.open, high: b.high, low: b.low, close: b.close
  })).filter(b => b.time > 0);

  candleSeries.setData(candleData);

  const closes = bars.map(b => b.close);
  const times  = candleData.map(b => b.time);

  // Strategy-specific indicators
  if (strategy === 'EMA') {
    addEMALine(chart, times, closes, 9,  '#f59e0b', 'EMA 9');
    addEMALine(chart, times, closes, 21, '#3b82f6', 'EMA 21');
    addEMALine(chart, times, closes, 50, '#8b5cf6', 'EMA 50');
    addBBLines(chart, times, closes);
  } else if (strategy === 'MSS') {
    addEMALine(chart, times, closes, 9,  '#a855f7', 'EMA 9');
    addEMALine(chart, times, closes, 21, '#6366f1', 'EMA 21');
    addEMALine(chart, times, closes, 50, '#4f46e5', 'EMA 50');
  } else if (strategy === 'VPA') {
    addEMALine(chart, times, closes, 20, '#22c55e', 'EMA 20');
  } else if (strategy === 'Breakout') {
    addEMALine(chart, times, closes, 20, '#f97316', 'EMA 20');
    // Add consolidation zone if available
    const sigs = LIVE.signals || {};
    const sig = (sigs[symbol.replace('/','')]||{})[strategy] || {};
    if (sig.consol_high) {
      const consolLine = chart.addLineSeries({ color: 'rgba(249,115,22,0.5)', lineWidth: 1, lineStyle: 2 });
      consolLine.setData(times.map(t => ({ time: t, value: sig.consol_high })));
    }
  }

  // TP and SL lines if position is open
  if (pos_data && pos_data.entry) {
    const entry = pos_data.entry;
    const tp    = entry * 1.015;
    const sl    = entry * 0.9925;

    const entryLine = chart.addLineSeries({ color: 'rgba(201,168,76,0.8)', lineWidth: 1, lineStyle: 2 });
    entryLine.setData(times.map(t => ({ time: t, value: entry })));

    const tpLine = chart.addLineSeries({ color: 'rgba(34,197,94,0.9)', lineWidth: 2, lineStyle: 0 });
    tpLine.setData(times.map(t => ({ time: t, value: tp })));

    const slLine = chart.addLineSeries({ color: 'rgba(239,68,68,0.9)', lineWidth: 2, lineStyle: 0 });
    slLine.setData(times.map(t => ({ time: t, value: sl })));

    // Mark entry point
    candleSeries.setMarkers([{
      time: times[times.length - 1],
      position: 'belowBar',
      color: color,
      shape: 'arrowUp',
      text: 'ENTRY',
    }]);
  }

  chart.timeScale().scrollToRealTime();
  activeCharts[symbol] = chart;

  // Responsive
  const ro = new ResizeObserver(() => {
    chart.resize(el.clientWidth, el.clientHeight);
  });
  ro.observe(el);
}

function addEMALine(chart, times, closes, period, color, label) {
  if (closes.length < period) return;
  const k = 2 / (period + 1);
  let ema = closes.slice(0, period).reduce((a,b) => a+b, 0) / period;
  const emaVals = [ema];
  for (let i = period; i < closes.length; i++) {
    ema = closes[i] * k + ema * (1 - k);
    emaVals.push(ema);
  }
  const series = chart.addLineSeries({ color, lineWidth: 1, priceLineVisible: false });
  const offset = closes.length - emaVals.length;
  series.setData(emaVals.map((v, i) => ({ time: times[i + offset], value: v })));
}

function addBBLines(chart, times, closes, period=20, std=2) {
  if (closes.length < period) return;
  const upper = [], lower = [];
  for (let i = period - 1; i < closes.length; i++) {
    const slice = closes.slice(i - period + 1, i + 1);
    const mean = slice.reduce((a,b)=>a+b,0)/period;
    const variance = slice.reduce((a,b)=>a+(b-mean)**2,0)/period;
    const sd = Math.sqrt(variance);
    upper.push({ time: times[i], value: mean + std*sd });
    lower.push({ time: times[i], value: mean - std*sd });
  }
  const uSeries = chart.addLineSeries({ color: 'rgba(59,130,246,0.4)', lineWidth: 1, priceLineVisible: false });
  const lSeries = chart.addLineSeries({ color: 'rgba(59,130,246,0.4)', lineWidth: 1, priceLineVisible: false });
  uSeries.setData(upper);
  lSeries.setData(lower);
}

async function changeTf(btn, tf, strategy, symbol) {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sp = LIVE.strategy_positions || {};
  const pos = LIVE.positions || {};
  const posData = pos[sp[strategy]] || null;
  await loadChart(symbol, tf, strategy, posData);
}

// ── Utils ─────────────────────────────────────────────────────────────
function fmt(n) {
  if (n === undefined || n === null) return '—';
  return Math.abs(n) >= 1000
    ? n.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})
    : n.toFixed(2);
}

function fmtPrice(sym, price) {
  if (!price) return '—';
  if (sym.includes('BTC')) return price.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
  if (sym.includes('ETH')) return price.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
  if (sym.includes('SOL')) return price.toFixed(4);
  if (sym.includes('DOGE')) return price.toFixed(6);
  return price.toFixed(5);
}
